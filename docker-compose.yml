services:
  mongo:
    image: mongo:latest
    container_name: rocketchat-mongo
    restart: unless-stopped
    volumes:
      - ./data/db:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=rocketchat
      - MONGO_INITDB_ROOT_PASSWORD=rocketchat
    ports:
      - "27017:27017"

  rocketchat:
    image: rocketchat/rocket.chat:latest
    container_name: rocketchat
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "3000:3000"
    environment:
      - MONGO_URL=mongodb://rocketchat:rocketchat@mongo:27017/rocketchat?authSource=admin
      - MONGO_OPLOG_URL=mongodb://rocketchat:rocketchat@mongo:27017/local?authSource=admin
      - ROOT_URL=http://localhost:3000
      - ADMIN_USERNAME=admin
      - ADMIN_PASS=admin123
      - ADMIN_EMAIL=admin@example.com
    volumes:
      - ./data/uploads:/app/uploads
